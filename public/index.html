<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IQ Gateway</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #0a0a0a; color: #eee; }
    h1 { color: #8b5cf6; }
    input, button { padding: 10px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #eee; }
    input { width: 100%; margin-bottom: 10px; }
    button { cursor: pointer; background: #8b5cf6; border: none; margin-right: 8px; }
    button:hover { background: #7c3aed; }
    .section { background: #111; border-radius: 10px; padding: 16px; margin: 16px 0; border: 1px solid #222; }
    pre { background: #0a0a0a; padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
    .preview { display: flex; gap: 16px; margin-top: 16px; }
    .preview img { width: 200px; height: 200px; border-radius: 8px; background: #1a1a1a; object-fit: contain; }
    .info { flex: 1; }
    .name { font-size: 20px; font-weight: bold; color: #8b5cf6; }
    .mono { font-family: monospace; font-size: 11px; color: #888; word-break: break-all; }
    #status { padding: 8px; background: #1a1a1a; border-radius: 6px; margin-bottom: 12px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>IQ Gateway</h1>
  <div id="status">Loading...</div>

  <div class="section">
    <h3>Test Metaplex URI</h3>
    <input type="text" id="uri" placeholder="http://localhost:3000/meta/{signature}.json">
    <button onclick="testUri()">Fetch</button>
    <button onclick="testDemo()">Demo</button>
    <div id="result"></div>
  </div>

  <div class="section">
    <h3>Browse Wallet</h3>
    <input type="text" id="pubkey" placeholder="Wallet pubkey">
    <button onclick="loadAssets()">Load</button>
    <button onclick="loadAssets('HEosZaCHerU9Lyt9TkQ8FWyP8qYPvWc9N8gjsroLUmGK')">Demo</button>
    <div id="assets"></div>
  </div>

<script>
const TEST_SIG = '52WXtc2TvQbYU3hsTVYLxqSYVCtK6sd3bHUfKZL5LXqR5vfKhCqbSeQpRmzciUpbmgqUxuphvJmX4zWp2a5oJdPp';

async function loadStatus() {
  try {
    const res = await fetch('/health');
    const d = await res.json();
    document.getElementById('status').innerHTML = `<span style="color:#4ade80">● Online</span> | Cache: ${d.cache.meta} meta, ${d.cache.images} img`;
  } catch {
    document.getElementById('status').innerHTML = '<span style="color:#f87171">● Offline</span>';
  }
}

function testDemo() {
  document.getElementById('uri').value = `${location.origin}/meta/${TEST_SIG}.json`;
  testUri();
}

async function testUri() {
  const uri = document.getElementById('uri').value.trim();
  if (!uri) return alert('Enter URI');

  const result = document.getElementById('result');
  result.innerHTML = '<p>Loading...</p>';

  try {
    const res = await fetch(uri);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const m = await res.json();

    result.innerHTML = `
      <div class="preview">
        <img src="${m.image}" alt="${m.name}" onerror="this.style.display='none'">
        <div class="info">
          <div class="name">${m.name || 'Unknown'}</div>
          <div style="color:#666">${m.description || 'No description'}</div>
          <div class="mono" style="margin-top:8px">${m.image}</div>
        </div>
      </div>
      <pre>${JSON.stringify(m, null, 2)}</pre>
    `;
  } catch (e) {
    result.innerHTML = `<p style="color:#f87171">Error: ${e.message}</p>`;
  }
}

async function loadAssets(pk) {
  const pubkey = pk || document.getElementById('pubkey').value.trim();
  if (!pubkey) return alert('Enter pubkey');

  const el = document.getElementById('assets');
  el.innerHTML = 'Loading...';

  try {
    const res = await fetch(`/user/${pubkey}/assets?limit=10`);
    const assets = await res.json();
    if (assets.error) throw new Error(assets.error);

    el.innerHTML = assets.map(a => {
      let meta = {}; try { meta = JSON.parse(a.metadata); } catch {}
      return `
        <div style="background:#1a1a1a;padding:10px;border-radius:6px;margin:6px 0;cursor:pointer"
             onclick="document.getElementById('uri').value='${location.origin}/meta/${a.signature}.json';testUri()">
          <b style="color:#8b5cf6">${meta.filename || '?'}</b>
          <span class="mono" style="margin-left:8px">${a.signature.slice(0,30)}...</span>
        </div>
      `;
    }).join('') || 'No assets';
  } catch (e) {
    el.innerHTML = `Error: ${e.message}`;
  }
}

loadStatus();
setInterval(loadStatus, 5000);
</script>
</body>
</html>
