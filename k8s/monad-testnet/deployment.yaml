apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-monad-testnet
  namespace: iqlabs
spec:
  replicas: 1
  selector:
    matchLabels: { app: gateway-monad-testnet }
  template:
    metadata:
      labels: { app: gateway-monad-testnet }
    spec:
      containers:
        - name: gateway
          image: iqlabs/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: IQ_CHAIN
              value: "evm"
            - name: IQETH_NETWORK
              value: "monadTestnet"
          # Secret supplies IQETH_RPC_ENDPOINT (+ optional ALCHEMY_API_KEY,
          # ENS_RPC_ENDPOINT, ADMIN_TOKEN).
          envFrom:
            - secretRef:
                name: gateway-monad-testnet-secret
          volumeMounts:
            - name: cache
              mountPath: /app/cache
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: gateway-monad-testnet-cache
